<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-store">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>📺 Mi Colección de Series</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3d;
    --accent: #e8c547;
    --accent2: #ff6b35;
    --accent3: #4ecdc4;
    --text: #e8e8f0;
    --text-dim: #888899;
    --text-muted: #555566;
    --vista: #4ade80;
    --pendiente: #60a5fa;
    --viendo: #fb923c;
    --card-hover: #1e1e2e;
    --radius: 8px;
    --imdb: #f5c518;
    --fa: #0065b0;
  }

  :root.light {
    --bg: #f4f4f8;
    --surface: #ffffff;
    --surface2: #eaeaf0;
    --border: #d0d0e0;
    --accent: #c9a800;
    --accent2: #ff6b35;
    --accent3: #2aaba2;
    --text: #1a1a2e;
    --text-dim: #555566;
    --text-muted: #9999aa;
    --vista: #16a34a;
    --pendiente: #2563eb;
    --viendo: #ea7316;
    --card-hover: #ebebf5;
    --imdb: #c9a800;
    --fa: #0065b0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* THEME TOGGLE */
  .btn-theme {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    width: 38px;
    height: 38px;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .btn-theme:hover { border-color: var(--accent); color: var(--text); }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, var(--bg) 0%, var(--surface) 50%, var(--bg) 100%);
    border-bottom: 1px solid var(--border);
    padding: 28px 32px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(20px);
  }

  .header-top {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 44px;
    height: 44px;
    background: var(--accent);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .logo-text h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 3px;
    color: var(--text);
    line-height: 1;
  }

  .logo-text p {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* STATS ROW — eliminat, comptadors als botons */

  /* CONTROLS */
  .controls {
    padding: 16px 32px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 40px 10px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--text-muted); }

  .search-wrap .icon {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 16px;
    pointer-events: none;
  }

  .filter-group {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .btn-filter {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    padding: 8px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-filter:hover { border-color: var(--accent); color: var(--text); }
  .btn-filter.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 600;
  }

  .select-styled {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 8px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    outline: none;
  }

  .select-styled:focus { border-color: var(--accent); }

  /* RESULT COUNT */
  .result-bar {
    padding: 10px 32px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    color: var(--text-dim);
  }

  .result-count strong {
    color: var(--accent);
    font-weight: 600;
  }

  /* GRID */
  .grid-container {
    padding: 24px 32px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(390px, 1fr));
    gap: 12px;
  }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0;
    overflow: hidden;
    transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
    cursor: default;
    display: flex;
    flex-direction: column;
  }

  .card:hover {
    transform: translateY(-2px);
    border-color: #3a3a54;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .card.vista-card { border-left: 3px solid var(--vista); }
  .card.viendo-card { border-left: 3px solid var(--viendo); }
  .card.pendiente-card { border-left: 3px solid var(--surface2); }

  .card-main {
    display: flex;
    gap: 14px;
    padding: 14px 16px 13px;
  }

  .poster {
    width: 116px;
    aspect-ratio: 2 / 3;
    border-radius: 7px;
    overflow: hidden;
    flex: 0 0 116px;
    background: linear-gradient(145deg, var(--surface2), #11111d);
    border: 1px solid var(--border);
    box-shadow: 0 8px 22px rgba(0,0,0,0.28);
  }

  .poster img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .poster-fallback {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px;
    letter-spacing: 0.5px;
  }

  .card-content {
    min-width: 0;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .status-icon {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .status-icon.vista { background: rgba(74,222,128,0.15); color: var(--vista); }
  .status-icon.viendo { background: rgba(251,146,60,0.15); color: var(--viendo); }
  .status-icon.pendiente { background: rgba(96,165,250,0.1); color: var(--pendiente); }
  .status-icon.anim { background: rgba(78,205,196,0.12); color: var(--accent3); }

  .card-title-wrap { flex: 1; min-width: 0; }

  .card-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.35;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-title a {
    color: inherit;
    text-decoration: none;
  }

  .card-title a:hover { color: var(--accent); }
  .card-year { font-size: 11px; color: var(--text-muted); font-weight: 400; margin-left: 5px; }

  .card-platform {
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 4px;
    flex-wrap: wrap;
  }

  .plat-icon {
    height: 18px;
    width: auto;
    max-width: 64px;
    object-fit: contain;
    border-radius: 3px;
    vertical-align: middle;
    flex-shrink: 0;
  }

  .plat-badge {
    display: inline-block;
    font-size: 9px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 3px;
    letter-spacing: 0.4px;
    white-space: nowrap;
    background: var(--surface2);
    color: var(--text-dim);
  }

  /* SCORES */
  .scores {
    display: flex;
    gap: 10px;
    padding-top: 14px;
    align-items: center;
  }

  .score-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 58px;
    padding: 6px 8px;
    border-radius: 6px;
    background: var(--surface2);
  }

  .score-label {
    font-size: 9px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 500;
  }

  .score-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    line-height: 1;
    letter-spacing: 0.5px;
  }

  .score-val.imdb-val { color: var(--imdb); }
  .score-val.fa-val { color: #60a5fa; }
  .score-val.media-val { color: var(--accent); }
  .score-val.na { color: var(--text-muted); font-size: 16px; }

  .score-bar-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 5px;
    min-width: 0;
    max-width: 280px;
  }

  .mini-bar-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .mini-bar-label {
    font-size: 10px;
    color: var(--text-muted);
    width: 24px;
    text-align: right;
  }

  .mini-bar {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 999px;
    overflow: hidden;
  }

  .mini-bar-fill {
    height: 100%;
    border-radius: 999px;
    transition: width 0.3s;
  }

  .mini-bar-fill.imdb { background: var(--imdb); }
  .mini-bar-fill.fa { background: #60a5fa; }

  .mini-bar-val {
    font-size: 10px;
    color: var(--text-dim);
    width: 28px;
    font-weight: 500;
  }

  /* CARD FOOTER */
  .card-footer {
    padding: 8px 16px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    border-top: 1px solid var(--border);
    margin-top: auto;
  }

  .episodes-badge {
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .tag {
    font-size: 10px;
    padding: 3px 7px;
    border-radius: 4px;
    font-weight: 500;
    letter-spacing: 0.3px;
  }

  .tag.vista { background: rgba(74,222,128,0.12); color: var(--vista); border: 1px solid rgba(74,222,128,0.2); }
  .tag.viendo { background: rgba(251,146,60,0.12); color: var(--viendo); border: 1px solid rgba(251,146,60,0.2); }
  .tag.pendiente { background: rgba(96,165,250,0.08); color: var(--pendiente); border: 1px solid rgba(96,165,250,0.15); }
  .tag.anim { background: rgba(78,205,196,0.1); color: var(--accent3); border: 1px solid rgba(78,205,196,0.2); }

  .seasons-info {
    font-size: 10px;
    color: var(--text-muted);
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    padding: 0 16px 8px;
  }
  .seasons-info span { display: flex; align-items: center; gap: 3px; }
  .tag.next { background: rgba(248,113,113,0.1); color: #f87171; border: 1px solid rgba(248,113,113,0.2); }

  .card-tags { display: flex; gap: 4px; flex-wrap: wrap; }

  /* LOADING */
  .loading {
    text-align: center;
    padding: 80px 32px;
    color: var(--text-muted);
    font-size: 15px;
  }

  .empty-state {
    text-align: center;
    padding: 80px 32px;
    color: var(--text-muted);
  }

  .empty-state .emoji { font-size: 48px; margin-bottom: 16px; }
  .empty-state h3 { font-size: 18px; color: var(--text-dim); margin-bottom: 8px; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .header { padding: 16px; }
    .controls { padding: 12px 16px; }
    .grid-container { padding: 16px; grid-template-columns: 1fr; }
    .card-main { padding: 12px; gap: 10px; }
    .poster { width: 78px; flex-basis: 78px; }
    .scores { gap: 8px; }
    .score-block { min-width: 54px; padding: 6px; }
    .result-bar { padding: 8px 16px; }
    .logo-text h1 { font-size: 24px; }
  }

  /* NOTA DE ESTRENO */
  .estreno-note {
    padding: 4px 16px 10px;
    font-size: 11px;
    color: var(--viendo);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* SORT OPTIONS */
  .sort-label { font-size: 12px; color: var(--text-muted); }

  /* ── ADMIN MODE ─────────────────────────────────────────────────────── */
  .admin-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 300;
    background: #0d1117; border-top: 2px solid var(--accent);
    padding: 10px 24px; display: flex; align-items: center;
    gap: 10px; font-size: 13px; flex-wrap: wrap;
  }
  :root.light .admin-bar { background: #fff8e6; }
  .admin-bar-label { color: var(--accent); font-weight: 700; flex-shrink: 0; }
  .btn-adm {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 5px 12px; border-radius: 5px;
    cursor: pointer; font-family: 'DM Sans',sans-serif; font-size: 12px;
    transition: border-color .15s;
  }
  .btn-adm:hover { border-color: var(--accent); }
  .btn-adm.primary { background: var(--accent); color: #000; font-weight: 600; border-color: var(--accent); }
  .btn-adm.danger  { color: #f87171; border-color: rgba(248,113,113,.3); }
  .btn-adm.danger:hover { background: rgba(248,113,113,.1); }
  .admin-status { font-size: 12px; margin-left: auto; }
  .admin-status.saving { color: var(--accent); }
  .admin-status.ok    { color: var(--vista); }
  .admin-status.err   { color: #f87171; }

  body.admin-mode { padding-bottom: 56px; }
  body.admin-mode .card { position: relative; }
  .btn-edit-card {
    position: absolute; top: 6px; right: 6px;
    background: rgba(0,0,0,.55); border: none; border-radius: 5px;
    color: #fff; width: 28px; height: 28px; font-size: 13px;
    cursor: pointer; display: none; align-items: center; justify-content: center;
    opacity: 0; transition: opacity .15s; z-index: 5;
  }
  body.admin-mode .btn-edit-card { display: flex; }
  body.admin-mode .card:hover .btn-edit-card { opacity: 1; }

  /* ── MODALS ──────────────────────────────────────────────────────────── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.6);
    display: flex; align-items: flex-start; justify-content: center;
    z-index: 500; backdrop-filter: blur(4px);
    padding: 24px; box-sizing: border-box;
  }
  .modal-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 28px; width: 100%; max-width: 460px;
    max-height: calc(100vh - 48px); overflow-y: auto; flex-shrink: 0;
  }
  .modal-edit { max-width: 680px; }
  .modal-box h2 { font-size: 17px; margin-bottom: 14px; color: var(--text); }
  .modal-box p  { font-size: 13px; color: var(--text-dim); margin-bottom: 14px; }
  .modal-token-input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 7px; color: var(--text); padding: 10px 12px;
    font-size: 13px; font-family: 'DM Sans',sans-serif; outline: none;
    margin-bottom: 16px; box-sizing: border-box;
  }
  .modal-token-input:focus { border-color: var(--accent); }
  .form-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  .form-grid label {
    display: flex; flex-direction: column; gap: 4px;
    font-size: 11px; color: var(--text-dim); font-weight: 500; letter-spacing: .3px; text-transform: uppercase;
  }
  .form-grid label.full { grid-column: 1 / -1; }
  .form-grid label.chk  { flex-direction: row; align-items: center; gap: 8px; text-transform: none; font-size: 13px; }
  .form-grid input, .form-grid select, .form-grid textarea {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); padding: 7px 10px;
    font-size: 13px; font-family: 'DM Sans',sans-serif; outline: none; width: 100%; box-sizing: border-box;
  }
  .form-grid input:focus, .form-grid select:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; margin-top: 20px; align-items: center; }
  .modal-actions .spacer { flex: 1; }

  .plat-checkboxes {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px;
  }
  .plat-cb {
    display: flex; align-items: center; gap: 5px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 5px; padding: 5px 9px; cursor: pointer;
    font-size: 12px; color: var(--text); font-weight: 500;
    text-transform: none; letter-spacing: 0; transition: all .15s;
    user-select: none;
  }
  .plat-cb:hover { border-color: var(--accent); }
  .plat-cb input[type=checkbox] { width: auto; margin: 0; accent-color: var(--accent); }
  .plat-cb:has(input:checked) {
    border-color: var(--accent); background: rgba(232,197,71,.12); color: var(--text);
  }

  .pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    padding: 24px 32px 40px;
    font-size: 13px;
    color: var(--text-dim);
  }

  .btn-page {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 20px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    transition: all 0.15s;
  }

  .btn-page:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .btn-page:disabled { opacity: 0.3; cursor: default; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon" onclick="logoClick()" style="cursor:pointer">📺</div>
      <div class="logo-text">
        <h1>SERIES TONI</h1>
        <p id="subtitle">Mi colección personal</p>
      </div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="btn-theme" id="btnLang" onclick="toggleLang()" title="Canviar idioma" style="font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;width:auto;padding:0 10px;">ES</button>
      <button class="btn-theme" id="btnTheme" onclick="toggleTheme()" title="Canviar tema">🌙</button>
    </div>
  </div>
</div>

<div class="controls">
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Buscar serie, plataforma..." oninput="applyFilters()">
    <span class="icon">🔍</span>
  </div>

  <div class="filter-group" id="estadoGroup">
    <button class="btn-filter active" onclick="setFilter('estado','all',this)">Todas</button>
    <button class="btn-filter" onclick="setFilter('estado','vista',this)">✅ Vistas</button>
    <button class="btn-filter" onclick="setFilter('estado','viendo',this)">▶️ Viendo</button>
    <button class="btn-filter" onclick="setFilter('estado','pendiente',this)">🔵 Pendientes</button>
    <button class="btn-filter" onclick="setFilter('estado','nova_temp',this)">🔔 Pend. nova temp.</button>
  </div>
  <button class="btn-filter" id="btnAnim" onclick="toggleAnim(this)">🎨 Animación</button>

  <select class="select-styled" id="platformFilter" onchange="applyFilters()">
    <option value="">Todas las plataformas</option>
    <option>Netflix</option>
    <option>Prime Video</option>
    <option>HBO MAX</option>
    <option>Disney+</option>
    <option>Movistar+</option>
    <option>Filmin</option>
    <option>Apple TV</option>
    <option>SkyShowtime</option>
    <option>TV España</option>
    <option>Crunchyroll</option>
    <option>Otra</option>
  </select>

  <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
  <span class="sort-label" id="sortLabel">Ordenar:</span>
  <select class="select-styled" id="sortFilter" onchange="applyFilters()">
    <option value="media">Media ↓</option>
    <option value="imdb">IMDB ↓</option>
    <option value="fa">Filmaffinity ↓</option>
    <option value="az">A-Z</option>
    <option value="episodios">Más episodios</option>
  </select>
  </div>
</div>

<div class="result-bar">
  <div class="result-count" id="resultCount">Cargando...</div>
  <div id="pageInfo"></div>
</div>

<div id="gridContainer" class="grid-container"></div>

<div class="pagination" id="pagination"></div>

<script>
// Theme — default light
const savedTheme = localStorage.getItem('theme');
if (savedTheme === 'dark') document.documentElement.classList.remove('light');
else document.documentElement.classList.add('light');

function toggleTheme() {
  const isLight = document.documentElement.classList.toggle('light');
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
  document.getElementById('btnTheme').textContent = isLight ? '☀️' : '🌙';
}
document.getElementById('btnTheme').textContent =
  document.documentElement.classList.contains('light') ? '☀️' : '🌙';

// i18n
const i18n = {
  ca: {
    subtitle: 'La meva col·lecció personal',
    series: 'sèries', vistes: 'vistes', veient: 'veient',
    pendents: 'pendents', novaTemp: 'nova temp.', animacio: 'animació',
    searchPlaceholder: 'Cercar sèrie, plataforma...',
    totes: 'Totes', btnVistes: '✅ Vistes', btnVeient: '▶️ Veient',
    btnPendents: '🔵 Pendents', btnNovaTemp: '🔔 Pend. nova temp.', btnAnim: '🎨 Animació',
    totesPlat: 'Totes les plataformes', ordenar: 'Ordenar:',
    sortMedia: 'Mitjana ↓', sortEps: 'Més episodis', labelMitjana: 'Mitjana',
    mostrant: (n, t) => `Mostrant <strong>${n}</strong> de <strong>${t}</strong> sèries`,
    pagina: (c, t) => `Pàgina ${c} de ${t}`,
    carregant: 'Carregant...',
    tagVeient: '▶ Veient', tagVista: '✓ Vista', tagPendent: 'Pendent',
    tagAnim: 'Anim.', tagTemp: '2a temp.', tagNova: '🔔 Nova temp.',
    estrena: 'Estrena:', emptyTitle: 'Sense resultats',
    emptyMsg: 'Prova altres filtres o cerca',
    errorTitle: 'Error en carregar dades',
    errorMsg: "Assegura't de servir els fitxers des d'un servidor web.",
    primera: '« Primera', anterior: '‹ Anterior',
    seguent: 'Següent ›', ultima: 'Última »',
  },
  es: {
    subtitle: 'Mi colección personal',
    series: 'series', vistes: 'vistas', veient: 'viendo',
    pendents: 'pendientes', novaTemp: 'nueva temp.', animacio: 'animación',
    searchPlaceholder: 'Buscar serie, plataforma...',
    totes: 'Todas', btnVistes: '✅ Vistas', btnVeient: '▶️ Viendo',
    btnPendents: '🔵 Pendientes', btnNovaTemp: '🔔 Pend. nueva temp.', btnAnim: '🎨 Animación',
    totesPlat: 'Todas las plataformas', ordenar: 'Ordenar:',
    sortMedia: 'Media ↓', sortEps: 'Más episodios', labelMitjana: 'Media',
    mostrant: (n, t) => `Mostrando <strong>${n}</strong> de <strong>${t}</strong> series`,
    pagina: (c, t) => `Página ${c} de ${t}`,
    carregant: 'Cargando...',
    tagVeient: '▶ Viendo', tagVista: '✓ Vista', tagPendent: 'Pendiente',
    tagAnim: 'Anim.', tagTemp: '2ª temp.', tagNova: '🔔 Nueva temp.',
    estrena: 'Estreno:', emptyTitle: 'Sin resultados',
    emptyMsg: 'Prueba otros filtros o búsqueda',
    errorTitle: 'Error al cargar datos',
    errorMsg: 'Asegúrate de servir los ficheros desde un servidor web.',
    primera: '« Primera', anterior: '‹ Anterior',
    seguent: 'Siguiente ›', ultima: 'Última »',
  }
};

let lang = localStorage.getItem('lang') || 'ca';

function applyLang() {
  const t = i18n[lang];
  document.getElementById('subtitle').textContent = t.subtitle;
  document.getElementById('searchInput').placeholder = t.searchPlaceholder;
  // Els botons d'estat i animació els actualitza renderStats() amb els comptadors
  document.querySelector('#platformFilter option:first-child').textContent = t.totesPlat;
  document.getElementById('sortLabel').textContent = t.ordenar;
  document.querySelector('#sortFilter option[value="media"]').textContent = t.sortMedia;
  document.querySelector('#sortFilter option[value="episodios"]').textContent = t.sortEps;
  document.getElementById('btnLang').textContent = lang === 'ca' ? 'ES' : 'CA';
  localStorage.setItem('lang', lang);
  if (SERIES_DATA.length > 0) { renderStats(); renderResults(); }
  else document.getElementById('resultCount').textContent = t.carregant;
}

function toggleLang() {
  lang = lang === 'ca' ? 'es' : 'ca';
  applyLang();
}

let SERIES_DATA = [];

fetch('series.json', { cache: 'no-store' })
  .then(r => {
    if (!r.ok) throw new Error('Error');
    return r.json();
  })
  .then(data => {
    SERIES_DATA = data;
    SERIES_DATA.forEach(s => { s.pm = getMainPlatform(s.p); });
    applyLang();
    applyFilters();
  })
  .catch(() => {
    const t = i18n[lang];
    document.getElementById('gridContainer').innerHTML =
      `<div class="empty-state" style="grid-column:1/-1"><div class="emoji">⚠️</div><h3>${t.errorTitle}</h3><p>${t.errorMsg}</p></div>`;
    document.getElementById('resultCount').textContent = t.errorTitle;
  });

const PAGE_SIZE = 60;
let currentPage = 1;
let filtered = [];
let activeFilters = { estado: 'all', animacion: false };

function getMainPlatform(p) {
  if (!p || p === '?') return 'Otra';
  const l = p.toLowerCase();
  if (l.includes('netflix')) return 'Netflix';
  if (l.includes('amazon') || l.includes('prime video') || l.includes('primevideo')) return 'Prime Video';
  if (l.includes('disney')) return 'Disney+';
  if (l.includes('max') && !l.includes('moviestar')) return 'HBO MAX';
  if (l.includes('apple')) return 'Apple TV';
  if (l.includes('moviestar')) return 'Movistar+';
  if (l.includes('filmin')) return 'Filmin';
  if (l.includes('skyshowtime') || (l.includes('sky') && !l.includes('skyline'))) return 'SkyShowtime';
  if (l.includes('crunchyroll')) return 'Crunchyroll';
  if (l.includes('rtve') || l.includes('tv3') || l.includes('tve') || l.includes('atres') || l.includes('moviestar') || l.includes('telecinco') || l.includes('antena')) return 'TV España';
  return 'Otra';
}


function renderStats() {
  const t = i18n[lang];
  const total    = SERIES_DATA.length;
  const vistas   = SERIES_DATA.filter(s => s.v && !s.w && !s.nt).length;
  const viendo   = SERIES_DATA.filter(s => s.w).length;
  const novaTemp = SERIES_DATA.filter(s => s.nt).length;
  const pendents = SERIES_DATA.filter(s => !s.v).length;
  const anim     = SERIES_DATA.filter(s => s.a).length;

  const btns = document.querySelectorAll('#estadoGroup .btn-filter');
  btns[0].textContent = `${t.totes} (${total.toLocaleString()})`;
  btns[1].textContent = `${t.btnVistes} (${vistas})`;
  btns[2].textContent = `${t.btnVeient} (${viendo})`;
  btns[3].textContent = `${t.btnPendents} (${pendents})`;
  btns[4].textContent = `${t.btnNovaTemp} (${novaTemp})`;
  document.getElementById('btnAnim').textContent = `${t.btnAnim} (${anim})`;
}

function setFilter(key, val, el) {
  activeFilters[key] = val;
  el.closest('#estadoGroup').querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function toggleAnim(el) {
  activeFilters.animacion = !activeFilters.animacion;
  el.classList.toggle('active', activeFilters.animacion);
  currentPage = 1;
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const plat = document.getElementById('platformFilter').value;
  const sort = document.getElementById('sortFilter').value;
  const estado = activeFilters.estado || 'all';
  const soloAnim = activeFilters.animacion;

  filtered = SERIES_DATA.filter(s => {
    if (estado === 'vista' && (!s.v || s.w)) return false;
    if (estado === 'viendo' && !s.w) return false;
    if (estado === 'pendiente' && s.v) return false;
    if (estado === 'nova_temp' && !s.nt) return false;
    if (soloAnim && !s.a) return false;
    if (plat && s.pm !== plat) return false;
    if (q && !s.t.toLowerCase().includes(q) && !s.p.toLowerCase().includes(q)) return false;
    return true;
  });

  // Sort
  filtered.sort((a, b) => {
    if (sort === 'media') return (b.m || 0) - (a.m || 0);
    if (sort === 'imdb') return (b.i || 0) - (a.i || 0);
    if (sort === 'fa') return (b.f || 0) - (a.f || 0);
    if (sort === 'az') return a.t.localeCompare(b.t, 'es');
    if (sort === 'episodios') return (b.e || 0) - (a.e || 0);
    return 0;
  });

  renderResults();
}

function renderResults() {
  const total = filtered.length;
  const totalPages = Math.ceil(total / PAGE_SIZE);
  if (currentPage > totalPages) currentPage = 1;

  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);

  const t = i18n[lang];
  document.getElementById('resultCount').innerHTML = t.mostrant(page.length, total);
  document.getElementById('pageInfo').innerHTML = totalPages > 1 ? t.pagina(currentPage, totalPages) : '';

  const container = document.getElementById('gridContainer');

  if (page.length === 0) {
    const te = i18n[lang];
    container.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="emoji">🎬</div><h3>${te.emptyTitle}</h3><p>${te.emptyMsg}</p></div>`;
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  container.innerHTML = page.map(s => renderCard(s)).join('');
  renderPagination(currentPage, totalPages);
}

function renderCard(s) {
  const statusClass = s.w ? 'viendo' : s.v ? 'vista' : 'pendiente';
  const statusIcon = s.w ? '▶' : s.v ? '✓' : '○';

  const imdbPct = s.i ? (s.i / 10 * 100).toFixed(1) : 0;
  const faPct = s.f ? (s.f / 10 * 100).toFixed(1) : 0;

  const imdbDisp = s.i ? s.i.toFixed(1) : '—';
  const faDisp = s.f ? s.f.toFixed(1) : '—';
  const mediaDisp = s.m && s.m > 0 ? s.m.toFixed(2) : '—';

  const titleEl = s.u
    ? `<a href="${s.u}" target="_blank" rel="noopener">${escHtml(s.t)}</a>`
    : escHtml(s.t);
  const posterAlt = escHtml(`Póster de ${s.t}`);
  const posterInitial = escHtml((s.t || '?').trim().charAt(0).toUpperCase() || '?');
  const posterEl = s.g
    ? `<div class="poster"><img src="${escHtml(s.g)}" alt="${posterAlt}" loading="lazy" referrerpolicy="no-referrer"></div>`
    : `<div class="poster"><div class="poster-fallback">${posterInitial}</div></div>`;

  // Tags
  const tc = i18n[lang];
  const tags = [];
  if (s.w) tags.push(`<span class="tag viendo">${tc.tagVeient}</span>`);
  else if (s.v) tags.push(`<span class="tag vista">${tc.tagVista}</span>`);
  else tags.push(`<span class="tag pendiente">${tc.tagPendent}</span>`);
  if (s.a) tags.push(`<span class="tag anim">${tc.tagAnim}</span>`);
  if (s.nt) tags.push(`<span class="tag next">${tc.tagNova}</span>`);

  // Episodes
  const epsText = s.e ? `📽 ${s.e} ep.` : '';

  // Estreno note
  let estrenoNote = '';
  if (s.es && s.es !== '' && s.es !== 'nan') {
    estrenoNote = `<div class="estreno-note">📅 ${tc.estrena} ${escHtml(s.es)}</div>`;
  }

  // Seasons info (only for "en curs")
  let seasonsInfo = '';
  if (s.w && (s.tv || s.tp)) {
    const parts = [];
    if (s.tv) parts.push(`<span>✓ T${escHtml(s.tv)}</span>`);
    if (s.tp) parts.push(`<span>⏳ T${escHtml(s.tp)}</span>`);
    seasonsInfo = `<div class="seasons-info">${parts.join('')}</div>`;
  }

  return `
<div class="card ${statusClass}-card">
  <button class="btn-edit-card" onclick="openEditSeries(${SERIES_DATA.indexOf(s)})" title="Editar">✏️</button>
  <div class="card-main">
    ${posterEl}
    <div class="card-content">
      <div class="card-header">
        <div class="status-icon ${s.a ? 'anim' : statusClass}">${s.a ? '🎨' : statusIcon}</div>
        <div class="card-title-wrap">
          <div class="card-title">${titleEl}${s.yr ? `<span class="card-year">(${s.yr})</span>` : ''}</div>
          <div class="card-platform">${platformBadge(s.p || '')}</div>
        </div>
      </div>
      <div class="scores">
        <div class="score-block">
          <span class="score-label">${i18n[lang].labelMitjana}</span>
          <span class="score-val media-val ${mediaDisp === '—' ? 'na' : ''}">${mediaDisp}</span>
        </div>
        <div class="score-bar-wrap">
          <div class="mini-bar-row">
            <span class="mini-bar-label" style="color:var(--imdb);font-size:9px;font-weight:600">IMDb</span>
            <div class="mini-bar"><div class="mini-bar-fill imdb" style="width:${imdbPct}%"></div></div>
            <span class="mini-bar-val">${imdbDisp}</span>
          </div>
          <div class="mini-bar-row">
            <span class="mini-bar-label" style="color:#60a5fa;font-size:9px;font-weight:600">FA</span>
            <div class="mini-bar"><div class="mini-bar-fill fa" style="width:${faPct}%"></div></div>
            <span class="mini-bar-val">${faDisp}</span>
          </div>
        </div>
      </div>
    </div>
  </div>
  ${estrenoNote}${seasonsInfo}
  <div class="card-footer">
    <div class="episodes-badge">${epsText}</div>
    <div class="card-tags">${tags.join('')}</div>
  </div>
</div>`;
}

const PLAT_CFG = {
  'Netflix':    { si: 'netflix',          color: 'E50914' },
  'Prime Video':{ wm: 'https://upload.wikimedia.org/wikipedia/commons/1/11/Amazon_Prime_Video_logo.svg', h: 14 },
  'HBO MAX':    { si: 'hbomax',            color: '002BE7', h: 24 },
  'Disney+':    { wm: 'https://upload.wikimedia.org/wikipedia/commons/3/3e/Disney%2B_logo.svg', h: 16 },
  'Apple TV':   { si: 'appletv',          color: '000000', h: 18 },
  'Crunchyroll':{ si: 'crunchyroll',      color: 'F47521', h: 18 },
  'SkyShowtime':{ wm: 'https://upload.wikimedia.org/wikipedia/commons/8/80/SkyShowtime_Logo.svg', h: 14 },
  'Movistar+':  { wm: 'https://upload.wikimedia.org/wikipedia/commons/1/1d/Movistar_Plus%2B_2022_logo.svg', h: 16 },
  'Filmin':     { wm: 'https://upload.wikimedia.org/wikipedia/commons/f/f5/Logo_Filmin_2023.png', h: 12 },
  'TV España':  { badge: 'TVE',    bg: '#C60B1E', fg: '#fff' },
};

function platformBadge(raw) {
  if (!raw) return '';
  return raw.split(',').map(p => {
    p = p.trim();
    const pm = getMainPlatform(p);
    const cfg = PLAT_CFG[pm];
    if (cfg?.si) {
      const h = cfg.h ? `height:${cfg.h}px;` : '';
      const bg = cfg.bg ? `background:${cfg.bg};border-radius:3px;padding:2px;` : '';
      const style = (h || bg) ? ` style="${h}${bg}"` : '';
      return `<img src="https://cdn.simpleicons.org/${cfg.si}/${cfg.color}" class="plat-icon" title="${escHtml(p)}" alt="${escHtml(pm)}" loading="lazy"${style}>`;
    }
    if (cfg?.wm) {
      const h = cfg.h ? ` style="height:${cfg.h}px"` : '';
      return `<img src="${cfg.wm}" class="plat-icon" title="${escHtml(p)}" alt="${escHtml(pm)}" loading="lazy"${h}>`;
    }
    if (cfg?.badge) return `<span class="plat-badge" style="background:${cfg.bg};color:${cfg.fg}" title="${escHtml(p)}">${cfg.badge}</span>`;
    return `<span class="plat-badge" title="${escHtml(p)}">${escHtml(pm || p)}</span>`;
  }).join('');
}

function escHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderPagination(cur, total) {
  if (total <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
  const tp = i18n[lang];
  document.getElementById('pagination').innerHTML = `
    <button class="btn-page" onclick="goPage(1)" ${cur===1?'disabled':''}>${tp.primera}</button>
    <button class="btn-page" onclick="goPage(${cur-1})" ${cur===1?'disabled':''}>${tp.anterior}</button>
    <span>${cur} / ${total}</span>
    <button class="btn-page" onclick="goPage(${cur+1})" ${cur===total?'disabled':''}>${tp.seguent}</button>
    <button class="btn-page" onclick="goPage(${total})" ${cur===total?'disabled':''}>${tp.ultima}</button>
  `;
}

function goPage(p) {
  currentPage = p;
  window.scrollTo(0, 0);
  renderResults();
}

// Init handled inside fetch callback
</script>

<script>
// ── ADMIN MODE ───────────────────────────────────────────────────────────────
const GH_OWNER = 'tserrano-css';
const GH_REPO  = 'series-tracker';
const GH_FILE  = 'series.json';

let adminMode = false;
let logoClicks = 0, logoTimer = null;

function logoClick() {
  logoClicks++;
  clearTimeout(logoTimer);
  logoTimer = setTimeout(() => { logoClicks = 0; }, 2000);
  if (logoClicks >= 5) {
    logoClicks = 0;
    const token = localStorage.getItem('gh_token');
    token ? enableAdmin() : showTokenModal();
  }
}

function showTokenModal() {
  document.getElementById('tokenModal').style.display = 'flex';
  setTimeout(() => document.getElementById('tokenInput').focus(), 100);
}
function closeTokenModal() { document.getElementById('tokenModal').style.display = 'none'; }

function saveToken() {
  const t = document.getElementById('tokenInput').value.trim();
  if (!t) return;
  localStorage.setItem('gh_token', t);
  document.getElementById('tokenInput').value = '';
  closeTokenModal();
  enableAdmin();
}

function enableAdmin() {
  adminMode = true;
  document.body.classList.add('admin-mode');
  document.getElementById('adminBar').style.display = 'flex';
  renderResults();
}

function exitAdmin() {
  adminMode = false;
  document.body.classList.remove('admin-mode');
  document.getElementById('adminBar').style.display = 'none';
  document.getElementById('adminStatus').textContent = '';
  renderResults();
}

function clearToken() {
  if (!confirm('Vols eliminar el token guardat?')) return;
  localStorage.removeItem('gh_token');
  exitAdmin();
}

// ── EDIT / ADD / DELETE ──────────────────────────────────────────────────────
let editingIdx = -1;

function openEditSeries(idx) {
  editingIdx = idx;
  const s = SERIES_DATA[idx];
  document.getElementById('editModalTitle').textContent = '✏️ ' + s.t;
  document.getElementById('editTitle').value   = s.t || '';
  document.getElementById('editEstat').value   = s.estat || 'No comencada';
  const platVals = (s.p || '').split(',').map(x => x.trim());
  document.querySelectorAll('input[name="plat"]').forEach(cb => { cb.checked = platVals.includes(cb.value); });
  document.getElementById('editImdb').value    = s.i ?? '';
  document.getElementById('editFa').value      = s.f ?? '';
  document.getElementById('editEps').value     = s.e ?? '';
  document.getElementById('editTv').value      = s.tv || '';
  document.getElementById('editTp').value      = s.tp || '';
  document.getElementById('editUrl').value     = s.u || '';
  document.getElementById('editPoster').value  = s.g || '';
  document.getElementById('editEstreno').value = s.es || '';
  document.getElementById('editAnim').checked  = !!s.a;
  document.getElementById('editYear').value    = s.yr || '';
  document.getElementById('btnDelete').style.display = 'inline-flex';
  document.getElementById('editModal').style.display = 'flex';
}

function openAddSeries() {
  editingIdx = -1;
  document.getElementById('editModalTitle').textContent = '➕ Nova sèrie';
  document.getElementById('editForm').reset();
  document.getElementById('editEstat').value = 'No comencada';
  document.querySelectorAll('input[name="plat"]').forEach(cb => { cb.checked = false; });
  document.getElementById('btnDelete').style.display = 'none';
  document.getElementById('editModal').style.display = 'flex';
  setTimeout(() => document.getElementById('editTitle').focus(), 100);
}

function closeEditModal() {
  document.getElementById('editModal').style.display = 'none';
}

function deleteSeries() {
  const s = SERIES_DATA[editingIdx];
  if (!confirm(`Eliminar "${s.t}"?`)) return;
  SERIES_DATA.splice(editingIdx, 1);
  closeEditModal();
  renderStats(); applyFilters();
  pushToGitHub();
}

function saveEdit() {
  const estat = document.getElementById('editEstat').value;
  const imdb  = parseFloat(document.getElementById('editImdb').value)  || null;
  const fa    = parseFloat(document.getElementById('editFa').value)    || null;
  const media = imdb && fa ? Math.round((imdb + fa) / 2 * 100) / 100 : (imdb || fa || null);
  const plat  = [...document.querySelectorAll('input[name="plat"]:checked')].map(cb => cb.value).join(', ');

  const updated = {
    t:  document.getElementById('editTitle').value.trim(),
    u:  document.getElementById('editUrl').value.trim(),
    p:  plat,
    i:  imdb, f: fa, m: media,
    v:  ['Completada','En curs','Pend. nova temp.'].includes(estat),
    w:  estat === 'En curs',
    nt: estat === 'Pend. nova temp.',
    a:  document.getElementById('editAnim').checked,
    e:  parseInt(document.getElementById('editEps').value) || null,
    yr: parseInt(document.getElementById('editYear').value) || null,
    es: document.getElementById('editEstreno').value.trim(),
    s:  '',
    g:  document.getElementById('editPoster').value.trim(),
    tv: document.getElementById('editTv').value.trim(),
    tp: document.getElementById('editTp').value.trim(),
    estat, pm: getMainPlatform(plat),
  };

  if (editingIdx === -1) {
    SERIES_DATA.push(updated);
  } else {
    SERIES_DATA[editingIdx] = updated;
    SERIES_DATA[editingIdx].pm = getMainPlatform(plat);
  }

  closeEditModal();
  renderStats(); applyFilters();
  pushToGitHub();
}

// ── GITHUB API ───────────────────────────────────────────────────────────────
async function pushToGitHub() {
  const token = localStorage.getItem('gh_token');
  if (!token) return;
  const statusEl = document.getElementById('adminStatus');
  statusEl.textContent = '⏳ Guardant…';
  statusEl.className = 'admin-status saving';

  try {
    const api = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_FILE}`;

    // 1. Get current SHA
    const meta = await fetch(api, {
      headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
    });
    if (!meta.ok) throw new Error(`No s'ha pogut llegir el fitxer (${meta.status})`);
    const { sha } = await meta.json();

    // 2. Encode content (UTF-8 safe base64)
    const content = JSON.stringify(SERIES_DATA, null, null);
    const b64 = btoa(unescape(encodeURIComponent(content)));

    // 3. Push
    const res = await fetch(api, {
      method: 'PUT',
      headers: {
        Authorization: `token ${token}`,
        Accept: 'application/vnd.github.v3+json',
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ message: 'Update series.json via web admin', content: b64, sha }),
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.message || `Error ${res.status}`);
    }

    statusEl.textContent = '✓ Guardat! GitHub Pages redesplegarà en ~1-2 min';
    statusEl.className = 'admin-status ok';
  } catch (e) {
    statusEl.textContent = `✗ ${e.message}`;
    statusEl.className = 'admin-status err';
  }
}
